# Количество реплик прокси
replicaCount: 1

# Контейнер прокси (nginx)
image:
  repository: ghcr.io/nothingness159/taskora-proxy
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret
# Сервис прокси
service:
  type: ClusterIP
  port: 80

# Сервисы фронта и бэка, на которые будем проксировать
frontend:
  serviceName: frontend
  port: 3000

backend:
  serviceName: backend
  port: 8080

# Конфиг nginx
nginx:
  config: |
   server {
        listen 80;
        server_name taskora.website www.taskora.website;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name taskora.website www.taskora.website;

        ssl_certificate /etc/letsencrypt/live/taskora.website/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/taskora.website/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

# Ресурсы прокси
resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 25m
    memory: 32Mi

# Liveness и Readiness для прокси
livenessProbe: 
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 5

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 5

# Монтирование ConfigMap с конфигом nginx
volumeMounts:
  - name: nginx-config
    mountPath: /etc/nginx/conf.d
volumes:
  - name: nginx-config
    configMap:
      name: proxy-nginx

# Ingress
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: taskora.website
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ServiceAccount
serviceAccount:
  create: true
  name: ""

# Автоскейлинг (выключен)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
