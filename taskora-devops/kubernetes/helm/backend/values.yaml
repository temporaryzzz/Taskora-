replicaCount: 1

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "taskora-backend"

ingress:
  enabled: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

image:
  repository: ghcr.io/nothingness159/taskora-backend
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 300m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 90Mi

envSecrets:
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: database-secret
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: database-secret
        key: password

  - name: SPRING_DATASOURCE_URL
    valueFrom:
      secretKeyRef:
        name: backend-secret
        key: URL

  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: backend-secret
        key: JWT

livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 5
  failureThreshold: 6
