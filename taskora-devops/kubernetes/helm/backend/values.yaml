replicaCount: 1

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "taskora-backend"

ingress:
  enabled: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

image:
  repository: taskora-backend
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 300m
    memory: 384Mi
  requests:
    cpu: 150m
    memory: 256Mi

envSecrets:
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: database-secret
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: database-secret
        key: password

  - name: SPRING_DATASOURCE_URL
    valueFrom:
      secretKeyRef:
        name: backend-secret
        key: URL

  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: backend-secret
        key: JWT

livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
