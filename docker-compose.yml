
services:
  # Frontend
  taskora-frontend:
    build:
      context: ./taskora-frontend
      dockerfile: Dockerfile.front-local
    env_file:
      - .env
    ports:
      - "3000:80"
    networks:
      - taskora-network
    depends_on:
      - taskora-backend
    environment: 
      FRONTEND_PROFILE: local

  taskora-backend:
      build: 
            context: ./taskora-backend
            dockerfile: Dockerfile
      env_file:
        - .env

      ports:
        - "8080:8080"
      networks:
        - taskora-network
      environment:
        SPRING_PROFILES_ACTIVE: local
        SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
        SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
        SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      depends_on:
        db:
          condition: service_healthy

  db:
    image: postgres:17
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - taskora-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:

networks:
  taskora-network:
    driver: bridge